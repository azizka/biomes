url: https://azizka.github.io/biomes/

template:
  bootstrap: 5

home:
  title: biomes — 31 biome layers and utilities for biogeographic research
  description: >
    biomes provides raster layers of 31 commonly used biome definitions
    (Fischer et al, 2022) at 10x10 km resolution globally, plus
    convenience functions to classify species occurrences into biomes,
    summarize them and visualize.

reference:
- title: Biome data
  desc: Load raster layers and metadata shipped with the package.
  contents:
  - biomes_get
  - biomes_info
  - biomes_information
  - biomes_legend
  - biomes_example
- title: Get occurrences from GBIF
  desc: Download and clean GBIF occurrences for a taxon.
  contents:
  - biomes_occ
- title: Classify and summarize occurrences
  contents:
  - biomes_classify
  - biomes_tab
- title: Rank biome layers for a dataset
  desc: Data-driven scoring of the 31 biome layers for a given occurrence set.
  contents:
  - biomes_rank
  - biomes_show_rank
- title: Visualize
  desc: Map occurrence records over a chosen biome layer.
  contents:
  - biomes_visualise
- title: One-call workflow
  desc: Single-call wrapper from taxon or dataset to table + map.
  contents:
  - biomes_full

articles:
- title: Get started
  navbar: ~
  contents:
  - biome-data
  - classify-summarize-map
  - one-call-workflow
